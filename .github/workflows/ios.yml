name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Locate, prepare, and build
        run: |
          set -e

          # 1) Find the Xcode workspace/project ANYWHERE in the repo
          #    (ignores the auto-generated one inside .xcodeproj and the .git folder)
          WORKSPACE=$(find . -name "*.xcworkspace" -not -path "*/project.xcworkspace" -not -path "*/.git/*" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" -not -path "*/.git/*" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            DIR=$(dirname "$WORKSPACE")
            CONTAINER="-workspace $(basename "$WORKSPACE")"
          elif [ -n "$PROJECT" ]; then
            DIR=$(dirname "$PROJECT")
            CONTAINER="-project $(basename "$PROJECT")"
          else
            echo "::error::No .xcodeproj or .xcworkspace found. Repo layout:"
            find . -maxdepth 3 -not -path "*/.git/*"
            exit 1
          fi

          cd "$DIR"
          echo "==> Working in: $(pwd)"
          echo "==> Container: $CONTAINER"

          # 2) Install dependencies only if the project uses them
          if [ -f Podfile ]; then
            echo "==> CocoaPods detected"
            pod install --repo-update
            WS=$(find . -maxdepth 1 -name "*.xcworkspace" -not -path "*/project.xcworkspace" | head -n 1)
            [ -n "$WS" ] && CONTAINER="-workspace $(basename "$WS")"
          elif [ -f Cartfile ]; then
            echo "==> Carthage detected"
            carthage bootstrap --use-xcframeworks --platform iOS
          fi

          # 3) Auto-detect the scheme name (prefers "SwiftWeather", else first found)
          SCHEMES=$(xcodebuild $CONTAINER -list 2>/dev/null | awk '/Schemes:/{f=1;next} /^$/{f=0} f{$1=$1;print}')
          echo "==> Available schemes:"
          echo "$SCHEMES"
          if echo "$SCHEMES" | grep -qx "SwiftWeather"; then
            SCHEME="SwiftWeather"
          else
            SCHEME=$(echo "$SCHEMES" | head -n 1)
          fi
          echo "==> Using scheme: $SCHEME"

          # 4) Build for the iOS Simulator (no code signing needed)
          xcodebuild $CONTAINER \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            clean build \
            CODE_SIGNING_ALLOWED=NO
